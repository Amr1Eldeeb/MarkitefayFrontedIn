<div class="edit-product-container animate-fade">
  <div class="card custom-form-card shadow-lg border-0 mx-auto">
    
    <!-- Header مع تدرج لوني بسيط -->
    <div class="card-header-gradient p-4 text-white rounded-top-4">
      <div class="d-flex align-items-center gap-3">
        <div class="icon-box bg-white text-primary rounded-3 p-2">
          <i class="bi bi-pencil-square fs-4"></i>
        </div>
        <div>
          <h3 class="fw-bold m-0">Update Product Details</h3>
          <p class="text-white-50 small m-0">Modify information, pricing, and stock levels</p>
        </div>
      </div>
    </div>
    
    <div class="card-body p-4 p-md-5">
      <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
        
        <!-- القسم الأول: المعلومات الأساسية -->
        <h5 class="section-title mb-4"><span>01</span> Basic Information</h5>
        <div class="row g-4 mb-5">
          <div class="col-md-8">
            <div class="form-floating custom-input">
              <input type="text" id="name" class="form-control border-0 bg-light" formControlName="name" placeholder="Name">
              <label for="name">Product Name</label>
            </div>
          </div>
          
          <div class="col-md-4">
            <div class="form-floating custom-input">
              <input type="number" id="categoryId" class="form-control border-0 bg-light" formControlName="categoryId" placeholder="Category">
              <label for="categoryId">Category ID</label>
            </div>
          </div>

          <div class="col-12">
            <div class="form-floating custom-input">
              <textarea id="description" class="form-control border-0 bg-light" formControlName="description" placeholder="Desc" style="height: 120px"></textarea>
              <label for="description">Detailed Description</label>
            </div>
          </div>
        </div>

        <!-- القسم الثاني: الأسعار والمخزون -->
        <h5 class="section-title mb-4"><span>02</span> Pricing & Inventory</h5>
        <div class="row g-4 mb-5 text-center">
          <div class="col-md-4">
            <div class="input-group-custom p-3 bg-light rounded-4 border-0">
              <label class="d-block text-muted small fw-bold mb-2">Unit Price ($)</label>
              <input type="number" class="form-control border-0 bg-transparent text-center fs-5 fw-bold" formControlName="price">
            </div>
          </div>
          
          <div class="col-md-4">
            <div class="input-group-custom p-3 bg-light rounded-4 border-0">
              <label class="d-block text-muted small fw-bold mb-2">Available Stock</label>
              <input type="number" class="form-control border-0 bg-transparent text-center fs-5 fw-bold" formControlName="stockQuantity">
            </div>
          </div>

          <div class="col-md-4">
            <div class="input-group-custom p-3 bg-light rounded-4 border-0">
              <label class="d-block text-muted small fw-bold mb-2">Size IDs</label>
              <input type="text" class="form-control border-0 bg-transparent text-center fs-5 fw-bold" formControlName="selectedSizeIds" placeholder="e.g. 1,2,5">
            </div>
          </div>
        </div>

        <!-- القسم الثالث: الوسائط (الصور) -->
        <h5 class="section-title mb-4"><span>03</span> Media Assets</h5>
        <div class="row g-4 mb-5 align-items-end">
          <div class="col-md-8">
            <div class="upload-zone p-4 text-center border-dashed rounded-4 bg-light transition">
              <i class="bi bi-cloud-arrow-up fs-1 text-primary mb-2"></i>
              <label for="images" class="d-block fw-bold mb-1 pointer">Upload New Images</label>
              <p class="text-muted extra-small">Drag & drop or click to select multiple files</p>
              <input type="file" id="images" class="form-control d-none" multiple (change)="onFilesSelected($event)">
            </div>
          </div>

          <div class="col-md-4">
            <div class="form-floating custom-input">
              <input type="number" id="mainImageIndex" class="form-control border-0 bg-light" formControlName="mainImageIndex" placeholder="Main Index">
              <label for="mainImageIndex">Hero Image Index</label>
            </div>
          </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="d-flex justify-content-center justify-content-md-end gap-3 pt-4 border-top">
          <button type="button" class="btn btn-outline-secondary px-5 py-3 rounded-pill fw-bold border-2" (click)="onCancel()">Discard</button>
          <button type="submit" class="btn btn-primary-gradient px-5 py-3 rounded-pill fw-bold shadow-sm" [disabled]="productForm.invalid">
            Save Changes <i class="bi bi-check-circle ms-2"></i>
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
